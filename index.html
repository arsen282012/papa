body{

.buttons{

button{

border:none;

button:active{

#win{

display:none;

.win-photo{

.text{

margin-top:20px;

line-height:1.8;

color:#ff006e;

}

.heart{

position:fixed;

pointer-events:none;

animation:fly linear;

z-index:999;

}

@keyframes fly{

0%{

transform:
translateY(0);

opacity:1;

}

100%{

transform:
translateY(-170vh)
rotate(360deg);

opacity:0;

}

}
